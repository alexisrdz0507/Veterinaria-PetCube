{% extends 'veterinaria/base.html' %}

{% block body_class %}bg-clientes{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3><i class="fas fa-user-plus"></i> {{ titulo }}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ cliente.nombre }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="apellido_paterno" class="form-label">Apellido Paterno</label>
                        <input type="text" name="apellido_paterno" class="form-control" value="{{ cliente.apellido_paterno }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="apellido_materno" class="form-label">Apellido Materno</label>
                        <input type="text" name="apellido_materno" class="form-control" value="{{ cliente.apellido_materno }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" value="{{ cliente.telefono }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo</label>
                        <input type="email" name="correo" class="form-control" value="{{ cliente.correo }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección</label>
                        <textarea name="direccion" class="form-control" rows="2" required>{{ cliente.direccion }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="fecha_registro" class="form-label">Fecha Registro</label>
                        <input type="date" name="fecha_registro" class="form-control" value="{{ cliente.fecha_registro|date:'Y-m-d' }}" required>
                    </div>

                    {% if not cliente %}
                    <hr>
                    <h5>Registrar mascota</h5>

                    <div class="mb-3">
                        <label for="nombre_mascota" class="form-label">Nombre de la mascota</label>
                        <input type="text" name="nombre_mascota" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="id_especie" class="form-label">Especie</label>
                        <select name="id_especie" class="form-select" required>
                            <option value="">Seleccione una especie</option>
                            {% for especie in especies %}
                            <option value="{{ especie.id_especie }}">{{ especie.nombre_especie }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="id_raza" class="form-label">Raza</label>
                        <select name="id_raza" class="form-select" required>
                            <option value="">Seleccione una raza</option>
                            {% for raza in razas %}
                            <option value="{{ raza.id_raza }}">{{ raza.nombre_raza }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="sexo" class="form-label">Sexo</label>
                        <select name="sexo" class="form-select" required>
                            <option value="M">Macho</option>
                            <option value="F">Hembra</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="fecha_nacimiento" class="form-label">Fecha de nacimiento</label>
                        <input type="date" name="fecha_nacimiento" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="peso" class="form-label">Peso (kg)</label>
                        <input type="number" name="peso" class="form-control" min="0" step="0.01" required>
                    </div>
                    {% endif %}

                    <div class="d-flex justify-content-between">
                        <a href="/clientes/" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
