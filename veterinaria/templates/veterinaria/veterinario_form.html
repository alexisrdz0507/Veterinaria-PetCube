{% extends 'veterinaria/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3><i class="fas fa-user-md"></i> {{ titulo }}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ veterinario.nombre }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="apellido_paterno" class="form-label">Apellido Paterno</label>
                        <input type="text" name="apellido_paterno" class="form-control" value="{{ veterinario.apellido_paterno }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="apellido_materno" class="form-label">Apellido Materno</label>
                        <input type="text" name="apellido_materno" class="form-control" value="{{ veterinario.apellido_materno }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="especialidad" class="form-label">Especialidad</label>
                        <select name="especialidad" class="form-control" required>
                            <option value="">Seleccione...</option>
                            <option value="General" {% if veterinario.especialidad == 'General' %}selected{% endif %}>General</option>
                            <option value="Cirugia" {% if veterinario.especialidad == 'Cirugia' %}selected{% endif %}>Cirugía</option>
                            <option value="Dermatologia" {% if veterinario.especialidad == 'Dermatologia' %}selected{% endif %}>Dermatología</option>
                            <option value="Cardiologia" {% if veterinario.especialidad == 'Cardiologia' %}selected{% endif %}>Cardiología</option>
                            <option value="Odontologia" {% if veterinario.especialidad == 'Odontologia' %}selected{% endif %}>Odontología</option>
                            <option value="Oftalmologia" {% if veterinario.especialidad == 'Oftalmologia' %}selected{% endif %}>Oftalmología</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" value="{{ veterinario.telefono }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo</label>
                        <input type="email" name="correo" class="form-control" value="{{ veterinario.correo }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="horario" class="form-label">Horario</label>
                        <input type="text" name="horario" class="form-control" value="{{ veterinario.horario }}" placeholder="Ej: 9:00-18:00" required>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/veterinarios/" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
