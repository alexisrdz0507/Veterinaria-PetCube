{% extends 'veterinaria/base.html' %}

{% block content %}

<h1>
    <i class="fas fa-database"></i> Administrar Backups
</h1>
<hr>

<div class="row mb-4">
    <div class="col-md-12">
        <a href="{% url 'crear_backup' %}" class="btn btn-success">
            <i class="fas fa-plus"></i> Crear Backup Ahora
        </a>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead class="table-success">
            <tr>
                <th>Nombre</th>
                <th>Tamaño (MB)</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for backup in backups %}
            <tr>
                <td>{{ backup.nombre }}</td>
                <td>{{ backup.tamaño }}</td>
                <td>{{ backup.fecha }}</td>
                <td>
                    <a href="{% url 'descargar_backup' backup.nombre %}"
                       class="btn btn-sm btn-primary">
                        <i class="fas fa-download"></i> Descargar
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">
                    No hay backups disponibles
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
