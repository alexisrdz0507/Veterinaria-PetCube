{% extends 'veterinaria/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3><i class="fas fa-user-plus"></i> {{ titulo }}</h3>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" value="{{ empleado.username }}" required>
                        <small class="text-muted">Sin espacios, solo letras minúsculas y puntos</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="first_name" class="form-control" value="{{ empleado.first_name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Apellidos</label>
                        <input type="text" name="last_name" class="form-control" value="{{ empleado.last_name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control" value="{{ empleado.email }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <select name="rol" class="form-select" required>
                            <option value="empleado" {% if empleado and empleado.perfil.rol == 'empleado' %}selected{% endif %}>Empleado</option>
                            <option value="recepcionista" {% if empleado and empleado.perfil.rol == 'recepcionista' %}selected{% endif %}>Recepcionista</option>
                        </select>
                        <small class="text-muted">La recepcionista gestiona la logística de ventas.</small>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'admin_panel' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
