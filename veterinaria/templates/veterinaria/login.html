<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PetCube Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #2c7a4d 0%, #1e5631 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 60px;
            color: #2c7a4d;
        }
        .login-header h2 {
            color: #2c7a4d;
            margin-top: 10px;
        }
        .btn-petcube {
            background-color: #2c7a4d;
            color: white;
            width: 100%;
        }
        .btn-petcube:hover {
            background-color: #1e5631;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-paw"></i>
            <h2>PetCube Veterinaria</h2>
            <p class="text-muted">Iniciar Sesión</p>
        </div>
        
        {% if form.errors %}
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-triangle"></i> Usuario o contraseña incorrectos
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="fas fa-user"></i> Usuario
                </label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Contraseña
                </label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-petcube">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>
        
        <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100 mt-3">
            <i class="fas fa-home"></i> Volver al inicio
        </a>

        <div class="text-center mt-3">
            <small class="text-muted">
                <i class="fas fa-info-circle"></i> Contacta al administrador para obtener tu usuario
            </small>
        </div>
    </div>
</body>
</html>
