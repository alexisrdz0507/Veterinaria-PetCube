<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCube - Área del Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .content-wrapper {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }
        footer {
            margin-top: auto;
            background: linear-gradient(135deg, #1e5631 0%, #2c7a4d 100%);
        }
        .card-hover {
            transition: transform 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #2c7a4d;
            border-left: 5px solid #2c7a4d;
            padding-left: 15px;
        }
        .table-success {
            background-color: #2c7a4d !important;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/mis-mascotas/">
                <i class="fas fa-paw"></i> PetCube Veterinaria
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/mis-mascotas/">
                            <i class="fas fa-dog"></i> Mis Mascotas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/mis-consultas/">
                            <i class="fas fa-stethoscope"></i> Mis Consultas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/mi-perfil/">
                            <i class="fas fa-user-circle"></i> Mi Perfil
                        </a>
                    </li>
                </ul>
                <div class="dropdown ms-3">
                    <button class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle"></i> {{ user.get_full_name|default:user.username }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/cerrar/">
                            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="content-wrapper">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <footer class="text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2026 PetCube Veterinaria - Tu mascota es nuestra prioridad</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
